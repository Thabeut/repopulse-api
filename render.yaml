services:
  - type: web
    name: repopulse-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: AUTH_ALLOW_DEV_HEADER
        value: "false"
      - key: SYNC_ENABLED
        value: "true"
      - key: SYNC_CRON
        value: "0 */6 * * *"
      - key: SYNC_CONCURRENCY
        value: "2"
      - key: SYNC_MIN_INTERVAL_MINUTES
        value: "30"
      - key: SNAPSHOT_RETENTION
        value: "90"
      - key: CORS_ORIGINS
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
